<!DOCTYPE html>
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <style>
        #textarea {
            width: 80%;
            max-width: 100%;
            box-sizing: border-box; /* 确保宽度包括padding和border */
            padding: 10px; /* 根据需要调整 */
            border: 1px solid #ccc; /* 根据需要调整 */
            border-radius: 5px; /* 根据需要调整 */
            resize: none; /* 禁止用户调整大小 */
            margin: 0 auto; /* 居中 */
            display: block; /* 使其成为块级元素，从而可以居中 */
        }
        .input-group {
        text-align: center; /* 将内部元素居中 */
    }

    .button {
        /* 添加您想要的按钮样式 */
        padding: 10px 20px;
        margin: 5px;
        border: none;
        background-color: #5fe58d;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
    }
    </style>
    
    </head>
    <body>
    
        <textarea id="textarea" placeholder="请输入您的问题"></textarea>
        <div class="search-container"></div>
        <div class="input-group">
          <!-- 隐藏的 API 密钥输入框 -->
          <input type="text" class="form-control" id="api_key" name="api_key" placeholder="sk-" style="display:none;">
        </div>
        <div class="input-group">
          <!-- GPT-3.5 Turbo 按钮 -->
          <button class="button" id="gpt-35-btn" data-api-url="https://openkey.cloud/v1/chat/completions" data-model="gpt-3.5-turbo">GPT-3</button>
          <!-- GPT-4 Turbo Preview 按钮 -->
          <button class="button" id="gpt-4-btn" data-api-url="https://openkey.cloud/v1/chat/completions" data-model="gpt-4-turbo-preview">GPT-4</button>
        </div>
        
        <script>
        document.addEventListener("DOMContentLoaded", function() {
            const textarea = document.getElementById("textarea");
            const apiKeyInput = document.getElementById('api_key');
        
            // 为两个按钮添加点击事件监听
            document.getElementById("gpt-35-btn").addEventListener("click", function() {
                testAPI(this.dataset.model); // 传入对应的模型标识符
            });
        
            document.getElementById("gpt-4-btn").addEventListener("click", function() {
                testAPI(this.dataset.model); // 传入对应的模型标识符
            });
        
            function testAPI(model) {
                const apiUrl = "https://openkey.cloud/v1/chat/completions";
                navigator.clipboard.readText().then(apiKey => {
                    if (!apiKey) {
                        alert("剪贴板中未检测到API密钥");
                        return;
                    }
                    apiKeyInput.value = apiKey; // 设置API密钥输入框的值
                    const originalInput = textarea.value || '请输入一些文本...';
        
                    textarea.value = "请稍后...";
        
                    const data = {
                        model: model,
                        messages: [
                            { role: "system", content: "You are a helpful assistant." },
                            { role: "user", content: originalInput }
                        ]
                    };
        
                    fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(data)
                    })
                    .then(response => response.json())
                    .then(response => {
                        textarea.value = response.choices[0].message.content;
                    })
                    .catch(error => {
                        textarea.value = "请求失败，请检查您的API密钥和其他设置。";
                        console.error("Error:", error);
                    });
                }).catch(err => {
                    console.error('Failed to read clipboard contents: ', err);
                });
            } 
        });
        </script>
